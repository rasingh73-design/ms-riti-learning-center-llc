<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Teacher Dashboard · Ms. Riti Learning Center</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="assets/css/style.css" />

  <script defer src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script defer src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
  <script defer src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
  <script defer src="https://www.gstatic.com/firebasejs/10.12.5/firebase-storage-compat.js"></script>
  <script defer src="assets/js/firebase.js"></script>
  <script defer src="assets/js/hw.js"></script>
  <script defer src="assets/js/main.js"></script>
</head>
<body>
<header class="backdrop">
  <div class="container nav">
    <div class="brand"><img src="assets/img/logo.svg" alt="logo"/><span>Ms. Riti <span style="color:var(--primary)">Learning Center</span></span></div>
    <nav class="navlinks">
      <a href="index.html">Home</a><a href="homework.html">Homework</a><a href="submit.html">Submit</a>
      <a href="practice.html">Practice</a><a href="stories.html">Stories</a><a href="admin.html">Teacher</a>
      <a href="login.html" id="loginLink">Login</a>
    </nav>
  </div>
</header>

<div class="container">
  <section class="hero">
    <div class="card">
      <div class="kicker">Teacher</div>
      <h1>Dashboard</h1>
      <p class="lead">Create assignments and review recent submissions.</p>
      <div class="notice">Ensure your user doc has <code>{ role: "teacher" }</code> in Firestore.</div>
    </div>
  </section>

  <section class="grid">
    <div class="card">
      <div class="badge">New Assignment</div>
      <div class="mt-2" style="display:grid;gap:.6rem;max-width:520px">
        <input id="aTitle" placeholder="Title"/>
        <select id="aGrade">
          <option>PreK</option><option>K</option><option>1</option><option>2</option><option>3</option>
          <option>4</option><option>5</option><option>6</option><option>7</option><option>8</option>
        </select>
        <select id="aSubject">
          <option>English Language Arts</option><option>Mathematics</option><option>Science</option><option>Social Studies</option>
          <option>Computer Science & Technology</option><option>Health & Physical Education</option>
          <option>Fine Arts – Music</option><option>Fine Arts – Visual Arts</option>
          <option>World Languages (where offered)</option><option>Reading Intervention / ESOL</option>
        </select>
        <input id="aDue" placeholder="Due (e.g., 2025-12-01)"/>
        <input id="aLink" placeholder="Optional: link or PDF URL"/>
        <button class="btn btn-primary" id="addAssignmentBtn">Add</button>
      </div>
    </div>

    <div class="card">
      <div class="badge">Recent Submissions</div>
      <div id="submissionsList" class="grid"></div>
    </div>
  </section>
</div>

<footer class="container">
  <div>© <span id="year"></span> Ms. Riti Learning Center</div>
  <div class="small">K–8 teacher–student portal.</div>
</footer>

<script>
  async function addAssignment(){
    try{
      const data = {
        title: document.getElementById('aTitle').value.trim(),
        grade: document.getElementById('aGrade').value,
        subject: document.getElementById('aSubject').value,
        due: document.getElementById('aDue').value.trim(),
        link: document.getElementById('aLink').value.trim()
      };
      await db.collection('assignments').add({ ...data, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
      alert('Assignment added');
    }catch(e){ alert(e.message); }
  }

  async function loadSubs(){
    const snap = await db.collection('submissions').orderBy('createdAt','desc').limit(50).get();
    const el = document.getElementById('submissionsList');
    el.innerHTML = snap.docs.map(d => {
      const s = d.data();
      return `<div class="row">
        <div>
          <div class="subject">${s.title || '(untitled)'}</div>
          <div class="small">Grade ${s.grade || ''} · ${s.subject || ''}</div>
        </div>
        ${s.url ? `<a class="btn btn-ghost" href="${s.url}" target="_blank">File</a>` : ''}
        ${s.link ? `<a class="btn btn-ghost" href="${s.link}" target="_blank">Link</a>` : ''}
      </div>`;
    }).join('');
  }

  document.getElementById('addAssignmentBtn').onclick = addAssignment;
  document.addEventListener("DOMContentLoaded", loadSubs);
</script>
</body>
</html>
