<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Submit Homework · Ms. Riti Learning Center</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="assets/css/style.css" />

  <script defer src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script defer src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
  <script defer src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
  <script defer src="https://www.gstatic.com/firebasejs/10.12.5/firebase-storage-compat.js"></script>
  <script defer src="assets/js/firebase.js"></script>
  <script defer src="assets/js/submit.js"></script>
  <script defer src="assets/js/main.js"></script>
</head>
<body>
<header class="backdrop">
  <div class="container nav">
    <div class="brand"><img src="assets/img/logo.svg" alt="logo"/><span>Ms. Riti <span style="color:var(--primary)">Learning Center</span></span></div>
    <nav class="navlinks">
      <a href="index.html">Home</a><a href="homework.html">Homework</a><a href="submit.html">Submit</a>
      <a href="practice.html">Practice</a><a href="stories.html">Stories</a><a href="admin.html">Teacher</a>
      <a href="login.html" id="loginLink">Login</a>
    </nav>
  </div>
</header>

<div class="container">
  <section class="hero">
    <div class="card">
      <div class="kicker">Turn In</div>
      <h1>Submit Homework</h1>
      <p class="lead">Upload a file or paste a link (login required).</p>
      <div class="mt-2" style="display:grid;gap:.6rem;max-width:520px">
        <input id="title" placeholder="Assignment title" />
        <select id="grade">
          <option>PreK</option><option>K</option><option>1</option><option>2</option><option>3</option>
          <option>4</option><option>5</option><option>6</option><option>7</option><option>8</option>
        </select>
        <select id="subject">
          <option>English Language Arts</option><option>Mathematics</option><option>Science</option><option>Social Studies</option>
          <option>Computer Science & Technology</option><option>Health & Physical Education</option>
          <option>Fine Arts – Music</option><option>Fine Arts – Visual Arts</option>
          <option>World Languages (where offered)</option><option>Reading Intervention / ESOL</option>
        </select>
        <input id="link" placeholder="Optional: link to Google Doc/Slides" />
        <input id="file" type="file" />
        <button class="btn btn-primary" id="submitBtn">Submit</button>
        <div class="small">Make sure you’re logged in.</div>
      </div>
    </div>
  </section>
</div>

<footer class="container">
  <div>© <span id="year"></span> Ms. Riti Learning Center</div>
  <div class="small">K–8 teacher–student portal.</div>
</footer>

<script>
  async function doSubmit() {
    const f = document.getElementById('file').files[0];
    const meta = {
      title: document.getElementById('title').value.trim(),
      grade: document.getElementById('grade').value,
      subject: document.getElementById('subject').value,
      link: document.getElementById('link').value.trim()
    };
    try {
      if (!auth.currentUser) { alert('Please login first.'); return; }
      if (f) {
        const path = `submissions/${auth.currentUser.uid}/${Date.now()}_${f.name}`;
        const ref = storage.ref().child(path);
        await ref.put(f);
        const url = await ref.getDownloadURL();
        await db.collection('submissions').add({ uid: auth.currentUser.uid, url, ...meta, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
      } else {
        await db.collection('submissions').add({ uid: auth.currentUser.uid, ...meta, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
      }
      alert('Submitted!');
      document.getElementById('file').value = '';
    } catch (e) { alert(e.message); }
  }
  document.getElementById('submitBtn').onclick = doSubmit;
</script>
</body>
</html>
