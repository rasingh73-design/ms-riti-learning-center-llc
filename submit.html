<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Submit Homework · Ms. Riti Learning Center</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="assets/css/style.css" />

  <!-- Firebase compat SDKs (order matters) -->
  <script defer src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script defer src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
  <script defer src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
  <script defer src="https://www.gstatic.com/firebasejs/10.12.5/firebase-storage-compat.js"></script>

  <!-- Your compat init: MUST contain real config; no imports -->
  <script defer src="assets/js/firebase.js?v=3"></script>

  <!-- If these contain imports, keep them commented out -->
  <!-- <script defer src="assets/js/submit.js"></script> -->
  <!-- <script defer src="assets/js/main.js"></script> -->
</head>
<body>
<header class="backdrop">
  <div class="container nav">
    <div class="brand"><img src="assets/img/logo.svg" alt="logo"/><span>Ms. Riti <span style="color:var(--primary)">Learning Center</span></span></div>
    <nav class="navlinks">
      <a href="index.html">Home</a><a href="homework.html">Homework</a><a href="submit.html">Submit</a>
      <a href="practice.html">Practice</a><a href="stories.html">Stories</a><a href="admin.html">Teacher</a>
      <a href="login.html" id="loginLink">Login</a>
    </nav>
  </div>
</header>

<div class="container">
  <section class="hero">
    <div class="card">
      <div class="kicker">Turn In</div>
      <h1>Submit Homework</h1>
      <p class="lead">Upload a file or paste a link (login required).</p>

      <div class="mt-2" style="display:grid;gap:.6rem;max-width:520px">
        <input id="title" placeholder="Assignment title" />
        <select id="grade">
          <option>PreK</option><option>K</option><option>1</option><option>2</option><option>3</option>
          <option>4</option><option>5</option><option>6</option><option>7</option><option>8</option>
        </select>
        <select id="subject">
          <option>English Language Arts</option><option>Mathematics</option><option>Science</option><option>Social Studies</option>
          <option>Computer Science & Technology</option><option>Health & Physical Education</option>
          <option>Fine Arts – Music</option><option>Fine Arts – Visual Arts</option>
          <option>World Languages (where offered)</option><option>Reading Intervention / ESOL</option>
        </select>
        <input id="link" placeholder="Optional: link to Google Doc/Slides" />
        <input id="file" type="file" />
        <button class="btn btn-primary" id="submitBtn">Submit</button>
        <div class="small">Signed in as: <span id="whoami">Signed out</span></div>
        <div class="small" id="statusMsg"></div>
      </div>
    </div>
  </section>
</div>

<footer class="container">
  <div>© <span id="year"></span> Ms. Riti Learning Center</div>
  <div class="small">K–8 teacher–student portal.</div>
</footer>

<script>
  // Simple helpers
  const showErr = (e) => { console.error(e); alert((e.code || 'error') + ': ' + (e.message || 'Failed')); };

  async function doSubmit() {
    try {
      const user = auth.currentUser;
      if (!user) { alert('Please login first.'); return; }

      const title  = document.getElementById('title').value.trim();
      const grade  = document.getElementById('grade').value;
      const subject= document.getElementById('subject').value;
      const link   = document.getElementById('link').value.trim();
      const fileEl = document.getElementById('file');
      const file   = fileEl.files[0] || null;
      const status = document.getElementById('statusMsg');

      if (!title) { alert('Please enter an assignment title.'); return; }

      status.textContent = 'Submitting…';

      let url = null;
      let storagePath = null;

      if (file) {
        // Basic client-side size guard (e.g., 20 MB)
        const MAX_MB = 20;
        if (file.size > MAX_MB * 1024 * 1024) {
          alert(`File too large. Max ${MAX_MB} MB.`);
          return;
        }

        storagePath = `submissions/${user.uid}/${Date.now()}_${file.name}`;
        const ref = storage.ref().child(storagePath);
        // Upload with metadata
        await ref.put(file, { contentType: file.type || 'application/octet-stream' });
        url = await ref.getDownloadURL();
      }

      // Write Firestore record
      await db.collection('submissions').add({
        uid: user.uid,
        email: user.email || null,
        title, grade, subject,
        link: link || null,
        url: url || null,
        storagePath: storagePath || null,
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
      });

      status.textContent = 'Submitted!';
      alert('Submitted!');
      // Reset fields
      fileEl.value = '';
      // (Optionally) clear title/link:
      // document.getElementById('title').value = '';
      // document.getElementById('link').value = '';
    } catch (e) {
      showErr(e);
      const status = document.getElementById('statusMsg');
      status.textContent = 'Submission failed.';
    }
  }

  // Wire after all defer scripts
  window.onload = () => {
    // footer year
    const y = document.getElementById('year'); if (y) y.textContent = new Date().getFullYear();

    // whoami
    auth.onAuthStateChanged(u => {
      document.getElementById('whoami').textContent = u ? (u.email || u.uid) : 'Signed out';
    });

    // sanity log
    console.log('submit init:', { firebase: !!window.firebase, auth: !!window.auth, db: !!window.db, storage: !!window.storage });

    document.getElementById('submitBtn').onclick = () => doSubmit();
  };
</script>
</body>
</html>
