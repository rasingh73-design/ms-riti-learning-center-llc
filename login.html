<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Login · Ms. Riti Learning Center</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="assets/css/style.css?v=3">


  <!-- Firebase compat SDKs (order matters) -->
  <script defer src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script defer src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
  <script defer src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
  <script defer src="https://www.gstatic.com/firebasejs/10.12.5/firebase-storage-compat.js"></script>

  <!-- Your compat init (NO imports inside this file) -->
  <script defer src="assets/js/firebase.js?v=5"></script>
</head>
<body>
<header class="backdrop">
  <div class="container nav">
    <div class="brand"><img src="assets/img/logo.png" alt="logo"/><span>Ms. Riti <span style="color:var(--primary)">Learning Center</span></span></div>
    <nav class="navlinks">
      <a href="index.html">Home</a><a href="homework.html">Homework</a><a href="submit.html">Submit</a>
      <a href="practice.html">Practice</a><a href="stories.html">Stories</a><a href="admin.html">Teacher</a>
      <a href="login.html" id="loginLink">Login</a>
    </nav>
  </div>
</header>

<div class="container">
  <section class="hero">
    <div class="card">
      <div class="kicker">Account</div>
      <h1>Login / Sign up</h1>
      <p class="lead">Use school email or Google.</p>

      <div class="mt-2" style="display:grid;gap:.6rem;max-width:420px">
        <input id="email" type="email" placeholder="Email"/>
        <input id="password" type="password" placeholder="Password"/>
        <div style="display:flex;gap:.5rem;flex-wrap:wrap">
          <button class="btn btn-primary" id="loginBtn">Login</button>
          <button class="btn btn-ghost" id="signupBtn">Create account</button>
          <button class="btn btn-ghost" id="googleBtn">Sign in with Google</button>
          <button class="btn btn-ghost" id="logoutBtn">Logout</button>
        </div>
        <div class="small">User: <span id="whoami">Signed out</span></div>
        <div class="small" id="msg"></div>
      </div>
    </div>

    <div class="card">
      <div class="badge">Privacy</div>
      <div class="small">Admins can restrict sign-ups by domain in Firebase Auth settings.</div>
    </div>
  </section>
</div>

<footer class="container">
  <div>© <span id="year"></span> Ms. Riti Learning Center</div>
  <div class="small">K–8 teacher–student portal.</div>
</footer>

<script>
  // ---------- helpers ----------
  const $  = id => document.getElementById(id);
  const log = (...a) => console.log('[login]', ...a);
  const showErr = (e) => {
    console.error(e);
    $('msg').textContent = (e?.code || 'error') + ': ' + (e?.message || 'Something went wrong');
    alert($('msg').textContent);
  };

  function nextTarget() {
    const qs = new URLSearchParams(location.search).get('next') || '';
    const saved = sessionStorage.getItem('next') || '';
    return (qs || saved).trim();
  }

  async function ensureUserDoc(uid, name) {
    const ref = db.collection('users').doc(uid);
    const snap = await ref.get();
    if (!snap.exists) {
      await ref.set({
        role: 'student',
        name: name || '',
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
      }, { merge: true });
      return 'student';
    }
    return snap.data().role || 'student';
  }

  async function handleRedirect(user) {
    // decide where to go and navigate
    const next = nextTarget();
    let role = 'student';
    try { role = await ensureUserDoc(user.uid, user.displayName); } catch(e) { console.warn(e); }
    sessionStorage.removeItem('next');
    const dest = next || ((role === 'teacher' || role === 'admin') ? 'admin.html' : 'index.html');
    location.replace(dest);
  }

  // ---------- UI actions ----------
  async function emailLogin() {
    const email = $('email').value.trim();
    const pass  = $('password').value.trim();
    await auth.signInWithEmailAndPassword(email, pass);
  }

  async function emailSignup() {
    const email = $('email').value.trim();
    const pass  = $('password').value.trim();
    const cred = await auth.createUserWithEmailAndPassword(email, pass);
    await ensureUserDoc(cred.user.uid, cred.user.displayName);
  }

  async function googleLogin() {
    try {
      const provider = new firebase.auth.GoogleAuthProvider();
      await auth.signInWithPopup(provider);
    } catch (e) {
      if (e?.code === 'auth/popup-blocked' || e?.code === 'auth/cancelled-popup-request') {
        await auth.signInWithRedirect(new firebase.auth.GoogleAuthProvider());
        return;
      }
      throw e;
    }
  }

  function doLogout() { return auth.signOut(); }

  // ---------- bootstrap ----------
  window.onload = async () => {
    // footer year
    const y = $('year'); if (y) y.textContent = new Date().getFullYear();

    log('init', { firebase: !!window.firebase, auth: !!window.auth, db: !!window.db });

    // wire UI
    $('loginBtn').onclick  = () => emailLogin().catch(showErr);
    $('signupBtn').onclick = () => emailSignup().catch(showErr);
    $('googleBtn').onclick = () => googleLogin().catch(showErr);
    $('logoutBtn').onclick = () => doLogout().catch(showErr);

    // if a redirect sign-in completed, user will be available here and onAuthStateChanged will fire
    try {
      const res = await auth.getRedirectResult();
      if (res && res.user) { log('redirect result'); return handleRedirect(res.user); }
    } catch (e) { console.warn('getRedirectResult', e); }

    // watch auth state
    auth.onAuthStateChanged((u) => {
      $('whoami').textContent = u ? (u.email || u.uid) : 'Signed out';
      if (u) handleRedirect(u);
    });

    // hard fallback in case events lag
    setTimeout(() => { if (auth.currentUser) handleRedirect(auth.currentUser); }, 1500);
  };
</script>
</body>
</html>
