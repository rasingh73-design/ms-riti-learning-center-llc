<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Homework · Sunshine Scholars</title>
<link rel="stylesheet" href="assets/css/style.css"/>
<script defer src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script defer src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
<script defer src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
<script defer src="https://www.gstatic.com/firebasejs/10.12.5/firebase-storage-compat.js"></script>
<script defer src="assets/js/firebase.js"></script>
<script defer src="assets/js/main.js"></script>
</head><body>
<header class="backdrop">
  <div class="container nav">
    <div class="brand"><img src="assets/img/logo.svg" alt="logo"/><span>Sunshine <span style='color:var(--primary)'>Scholars</span></span></div>
    <nav class="navlinks">
      <a href="index.html">Home</a><a href="homework.html">Homework</a><a href="submit.html">Submit</a>
      <a href="practice.html">Practice</a><a href="stories.html">Stories</a><a href="admin.html">Teacher</a>
      <a href="login.html" id="loginLink">Login</a>
    </nav>
  </div>
</header>
<div class="container">

<section class="hero">
  <div class="card">
    <div class="kicker">Assignments</div>
    <h1>Homework by Grade & Subject</h1>
    <div class="mt-2" style="display:flex;gap:.5rem;flex-wrap:wrap">
      <select id="gradeSel"></select><select id="subjectSel"></select>
      <button class="btn btn-primary" onclick="HW.renderList('hwList','gradeSel','subjectSel')">Filter</button>
      <button class="btn btn-ghost" onclick="document.getElementById('gradeSel').value='';document.getElementById('subjectSel').value='';HW.renderList('hwList','gradeSel','subjectSel')">Reset</button>
    </div>
  </div>
</section>
<section class="mt-2"><div id="hwList" class="grid"></div></section>
<script src="assets/js/hw.js" defer></script>
<script>document.addEventListener("DOMContentLoaded",()=>{SS.mountGrade('gradeSel');SS.mountSubject('subjectSel');HW.renderList('hwList','gradeSel','subjectSel');});</script>

</div>
<footer class="container">
  <div>© <span id="year"></span> Sunshine Scholars</div>
  <div class="small">K–8 teacher–student portal. Built to grow with you.</div>
</footer>
</body></html>
